<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>智能文言文翻译器</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        background: #f5f8ff;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }
      textarea {
        width: 100%;
        height: 200px;
        padding: 1rem;
        resize: vertical;
        box-sizing: border-box;
        font-size: 1rem;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 4px;
        padding: 0.6rem 1.4rem;
        font-size: 0.95rem;
      }
      .primary {
        background: #3b6cff;
        color: #fff;
      }
      .secondary {
        background: #e7eaf3;
        color: #333;
        margin-right: 0.5rem;
      }
      h1 {
        text-align: center;
        margin-bottom: 2rem;
      }
      h3 {
        margin: 0 0 0.5rem 0;
      }
      .flex {
        display: flex;
        flex-wrap: wrap;
        gap: 2rem;
      }
      .box {
        flex: 1;
        min-width: 280px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>智能文言文翻译器</h1>
      <div class="flex">
        <div class="box">
          <h3>输入文言文</h3>
          <textarea id="input" placeholder="在此输入文言文..."></textarea>
          <button id="translateBtn" class="primary" style="margin-top: 0.5rem">
            AI模型翻译
          </button>
        </div>

        <div class="box">
          <h3>翻译结果</h3>
          <textarea id="output" readonly></textarea>
          <div style="margin-top: 0.5rem">
            <button id="copyBtn" class="secondary">复制</button>
            <button id="readBtn" class="secondary">朗读</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
