<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置管理 - 智能文言文翻译器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/config.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>配置管理</h1>
            <p class="subtitle">配置AI模型和系统参数</p>
        </header>

        <div class="config-container">
            <div class="config-section">
                <div class="section-header">
                    <span class="icon">🤖</span>
                    <h2>AI模型配置</h2>
                </div>
                
                <div class="model-tabs">
                    <button class="tab-btn active" data-model="qwen">通义千问</button>
                    <button class="tab-btn" data-model="openai">OpenAI GPT</button>
                </div>
                
                <div class="model-config" id="qwen-config">
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="qwen-enabled" class="model-enabled">
                            启用此模型
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label for="qwen-api-key">API密钥</label>
                        <input type="password" id="qwen-api-key" placeholder="请输入通义千问API密钥">
                        <small>获取密钥：<a href="https://dashscope.console.aliyun.com/apiKey" target="_blank">阿里云控制台</a></small>
                    </div>
                    
                    <div class="form-group">
                        <label for="qwen-model">模型选择</label>
                        <select id="qwen-model">
                            <option value="qwen-max">qwen-max (最强模型)</option>
                            <option value="qwen-plus">qwen-plus (性价比高)</option>
                            <option value="qwen-turbo">qwen-turbo (速度快)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="qwen-prompt">提示词模板</label>
                        <textarea id="qwen-prompt" rows="4" placeholder="输入提示词模板，使用 {text} 作为文言文占位符"></textarea>
                    </div>
                </div>
                
                <div class="model-config" id="openai-config" style="display: none;">
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="openai-enabled" class="model-enabled">
                            启用此模型
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label for="openai-api-key">API密钥</label>
                        <input type="password" id="openai-api-key" placeholder="请输入OpenAI API密钥">
                        <small>获取密钥：<a href="https://platform.openai.com/api-keys" target="_blank">OpenAI平台</a></small>
                    </div>
                    
                    <div class="form-group">
                        <label for="openai-base-url">API地址</label>
                        <input type="text" id="openai-base-url" placeholder="https://api.openai.com/v1">
                        <small>可以使用第三方兼容接口</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="openai-model">模型选择</label>
                        <select id="openai-model">
                            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                            <option value="gpt-4">GPT-4</option>
                            <option value="gpt-4-turbo-preview">GPT-4 Turbo</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="openai-prompt">提示词模板</label>
                        <textarea id="openai-prompt" rows="4" placeholder="输入提示词模板，使用 {text} 作为文言文占位符"></textarea>
                    </div>
                </div>
            </div>
            
            <div class="config-section">
                <div class="section-header">
                    <span class="icon">⚙️</span>
                    <h2>系统设置</h2>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="cache-enabled">
                        启用翻译缓存
                    </label>
                    <small>缓存已翻译的内容，提高响应速度</small>
                </div>
                
                <div class="form-group">
                    <label for="cache-max-size">最大缓存条数</label>
                    <input type="number" id="cache-max-size" min="100" max="100000" step="100">
                </div>
                
                <div class="form-group">
                    <label for="server-port">服务端口</label>
                    <input type="number" id="server-port" min="1024" max="65535">
                    <small>修改后需要重启服务</small>
                </div>
            </div>
        </div>
        
        <div class="action-buttons">
            <button id="save-config" class="primary-btn">
                <span class="icon">💾</span> 保存配置
            </button>
            <button id="reset-config" class="secondary-btn">
                <span class="icon">🔄</span> 重置默认
            </button>
            <a href="/" class="secondary-btn">
                <span class="icon">🏠</span> 返回主页
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
</body>
</html>
