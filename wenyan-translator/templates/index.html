<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能文言文翻译器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>智能文言文翻译器</h1>
            <p class="subtitle">专业、高效、准确的文言文翻译</p>
        </header>

        <div class="translator-settings">
            <label for="translate-mode">翻译成：</label>
            <select id="translate-mode">
                <option value="modern">白话文</option>
            </select>
        </div>

        <div class="translator-container">
            <div class="input-section">
                <div class="section-header">
                    <span class="icon">📖</span>
                    <h2>输入文本</h2>
                </div>
                <textarea 
                    id="input-text" 
                    placeholder="在此输入文言文..."
                    rows="10"
                ></textarea>
                <div class="button-group">
                    <button id="paste-btn" class="secondary-btn">
                        <span class="icon">📋</span> 粘贴
                    </button>
                    <button id="translate-btn" class="primary-btn">
                        <span class="icon">🎯</span> AI模型翻译
                    </button>
                </div>
            </div>

            <div class="output-section">
                <div class="section-header">
                    <span class="icon">🌐</span>
                    <h2>翻译结果</h2>
                </div>
                <div id="output-text" class="output-area">
                    <p class="placeholder">翻译结果将在这里显示...</p>
                </div>
                <div class="button-group">
                    <button id="copy-btn" class="secondary-btn" disabled>
                        <span class="icon">📄</span> 复制
                    </button>
                    <button id="speak-btn" class="secondary-btn" disabled>
                        <span class="icon">🔊</span> 朗读
                    </button>
                </div>
            </div>
        </div>

        <div class="history-section">
            <div class="section-header">
                <span class="icon">📚</span>
                <h2>翻译历史</h2>
                <button id="refresh-history" class="icon-btn" title="刷新历史">
                    🔄
                </button>
            </div>
            <div id="history-list" class="history-list">
                <p class="loading">加载中...</p>
            </div>
        </div>

        <footer>
            <a href="/config" class="config-link">⚙️ 配置管理</a>
            <p class="copyright">© 2024 智能文言文翻译器</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
