models:
  - name: tongyi-qwen
    provider: alibaba
    api_key: "YOUR_ALIBABA_API_KEY"
    model: "qwen-turbo"
    prompt_template: "请将以下文言文翻译成现代汉语：{text}"
  - name: openai-gpt
    provider: openai
    api_key: "YOUR_OPENAI_API_KEY"
    model: "gpt-3.5-turbo"
    prompt_template: "Translate the following classical Chinese into modern Chinese: {text}"

default_model: tongyi-qwen